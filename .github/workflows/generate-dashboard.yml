name: Generate JIRA Dashboard

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  push:
    branches: [main]
  workflow_dispatch:           # manual trigger button in GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch JIRA data and generate dashboard
        env:
          JIRA_DOMAIN: dcoretech.atlassian.net
          JIRA_EMAIL: venkateswara.r@dcoretech.in
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT: TMS02
        run: python3 generate.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: refresh dashboard data [skip ci]"
          git push
